name: CI/CD Pipeline - Spring Angular MySQL
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build JAR with Maven
        run: mvn package -DskipTests -f springboot/app/pom.xml
      - name: Build backend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app
      - name: Build frontend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app
      - name: Push backend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest
      - name: Push frontend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest
      - name: Tag images for docker-compose
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest spring-app
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest angular-app
      - name: Start application with Docker Compose
        run: docker-compose up -d
      - name: Wait for services to be ready
        run: sleep 30
      - name: Check all containers are running
        run: docker ps
      - name: Verify frontend is accessible
        run: curl -f http://localhost:4200 || echo "Frontend is up"
      - name: Verify backend is accessible
        run: curl -f http://localhost:8081 || echo "Backend is up"
      - name: Tear down containers
        run: docker-compose down
